<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumi Shop - Catálogo Oficial</title>
    <style>
        :root {
            /* Un fondo sutilmente rosa pastel, muy suave para que no canse la vista */
            --bg-main: #fff5f6; 
            --border-color:#f2dbde;
            --accent-gold: #c5a059;
            /* Blanco puro para las tarjetas de los bolsos, genera un contraste hermoso */
            --card-bg: #ffffff; 
            
            /* El rosa protagonista: un tono elegante y maduro (Rose Gold / Viejo) para botones y etiquetas */
            --accent-color: #d48896; 
            
            /* Un rosa más oscuro para cuando el cliente pase el mouse por encima de los botones (Efecto Hover) */
            --accent-hover: #b86d7b; 
            
            /* Gris oscuro profundo (casi negro) para los textos principales, máxima legibilidad */
            --text-main: #2d2526; 
            
            /* Gris suave para textos secundarios como las referencias */
            --text-muted: #7d6f71; 
            
            /* El color de los bordes de las tarjetas */
            --border-color: #f2dbde;
            
            /* Sombra suave premium para dar profundidad */
            --shadow-subtle: 0 8px 24px rgba(212, 136, 150, 0.08);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            padding-bottom: 100px;
        }

        /* Header Elegante y Minimalista */
        header {
            text-align: center;
            padding: 50px 20px 30px;
            background: var(--card-bg);
            border-bottom: 1px solid var(--border-color);
        }

        header h1 {
            font-size: 1.8rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 8px;
            color: var(--accent-gold);
        }

        header p {
            font-size: 0.85rem;
            letter-spacing: 1px;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .container {
            max-width: 1100px;
            margin: 40px auto 0;
            padding: 0 20px;
        }

        /* Grid del catálogo */
        .grid-productos {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }

        @media (min-width: 768px) {
            .grid-productos { grid-template-columns: repeat(3, 1fr); gap: 30px; }
        }
        @media (min-width: 1024px) {
            .grid-productos { grid-template-columns: repeat(4, 1fr); }
        }

        /* Tarjetas de Producto Boutique */
        .card {
            background: var(--card-bg);
            border-radius: 16px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: var(--shadow-subtle);
            border: 1px solid var(--border-color);
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .card:hover {
            transform: translateY(-4px);
        }

        .img-container {
            position: relative;
            width: 100%;
            padding-top: 105%;
            background-color: var(--bg-main);
        }

        .img-container img {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover;
        }

        .info {
            padding: 16px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .ref-tag {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--accent-color);
            font-weight: 700;
            margin-bottom: 4px;
        }

        .titulo {
            font-size: 0.9rem;
            font-weight: 500;
            margin-bottom: 6px;
            line-height: 1.3;
            color: var(--text-main);
            height: 38px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .precio {
            font-size: 1.05rem;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 14px;
        }

        /* Botón Añadir con interactividad de color */
        .btn-add {
            background-color: var(--accent-color);
            color: var(--card-bg);
            border: none;
            padding: 12px;
            border-radius: 10px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin-top: auto;
            transition: background-color 0.2s ease;
        }

        .btn-add:hover {
            background-color: var(--accent-hover);
        }

        .btn-add:active { transform: scale(0.97); }
        .btn-add.added { background-color: #5c7a67; } /* Mantiene verde sutil al agregarse */

        /* Barra de Carrito Flotante Elegante */
        .cart-bar {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(150px);
            width: calc(100% - 40px);
            max-width: 450px;
            background: rgba(45, 37, 38, 0.96);
            backdrop-filter: blur(8px);
            color: var(--card-bg);
            padding: 16px 20px;
            border-radius: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.15);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 1000;
        }

        .cart-bar.show {
            transform: translateX(-50%) translateY(0);
        }

        .cart-info p:first-child { font-size: 0.8rem; opacity: 0.6; text-transform: uppercase; letter-spacing: 1px; }
        .cart-info p:last-child { font-size: 1.1rem; font-weight: 700; color: var(--bg-main); }

        .btn-checkout {
            background: var(--card-bg);
            color: var(--text-main);
            border: none;
            padding: 12px 18px;
            border-radius: 12px;
            font-size: 0.85rem;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: background-color 0.2s;
        }
        .btn-checkout:hover { background-color: var(--bg-main); }
        .btn-checkout:active { transform: scale(0.95); }

        /* Estilos del Modal del Mensaje */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(4px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            opacity: 0; pointer-events: none;
            transition: opacity 0.3s ease;
        }
        .modal-overlay.open {
            opacity: 1; pointer-events: auto;
        }
        .modal-box {
            background: var(--bg-main);
            width: calc(100% - 32px);
            max-width: 480px;
            border-radius: 20px;
            padding: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
            border: 1px solid var(--border-color);
            transform: scale(0.9);
            transition: transform 0.3s ease;
        }
        .modal-overlay.open .modal-box {
            transform: scale(1);
        }
        .modal-box h3 {
            font-size: 1.2rem; font-weight: 500; margin-bottom: 8px; letter-spacing: 0.5px;
        }
        .modal-box p {
            font-size: 0.85rem; color: var(--text-muted); margin-bottom: 16px; line-height: 1.4;
        }
        .modal-textarea {
            width: 100%; height: 180px;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 12px;
            font-size: 0.9rem; color: var(--text-main);
            resize: none; outline: none;
            line-height: 1.4; margin-bottom: 20px;
        }
        .modal-textarea:focus {
            border-color: var(--accent-color);
        }
        .modal-buttons {
            display: flex; gap: 12px; justify-content: flex-end;
        }
        .btn-modal-cancel {
            background: none; border: none; color: var(--text-muted); padding: 12px 16px;
            font-size: 0.9rem; font-weight: 600; cursor: pointer;
        }
        .btn-modal-send {
            background: var(--accent-color); color: var(--card-bg); border: none;
            padding: 12px 24px; border-radius: 10px; font-size: 0.9rem;
            font-weight: 600; cursor: pointer; transition: background-color 0.2s;
        }
        .btn-modal-send:hover {
            background-color: var(--accent-hover);
        }
    </style>
</head>
<body>

    <header>
        <h1>Lumi Shop</h1>
        <p>Catálogo Exclusivo de Bolsos</p>
    </header>

    <main class="container">
        <div class="grid-productos" id="gridProductos"></div>
    </main>

    <div class="cart-bar" id="cartBar">
        <div class="cart-info">
            <p id="itemsCount">0 Productos seleccionados</p>
            <p id="itemsTotal">$0</p>
        </div>
        <button class="btn-checkout" onclick="abrirModalPedido()">
            Finalizar por WhatsApp 🛍️

    <div class="modal-overlay" id="pedidoModal">

            <div class="modal-buttons">

                <button class="btn-modal-send" onclick="enviarPedidoConfirmado()">Enviar</button>
            </div>
        </div>
    </div>

            { ref: "Ref020", nombre: "Bolso rojo elegante llamativo perfecto dar personalidad", precio: 75000, img: "imagenes/Ref020.jpeg" },
            { ref: "Ref021", nombre: "Bolso negro tipo Baúl herrajes dorados dos modos de uso", precio: 100000, img: "imagenes/Ref021.jpeg" },
            { ref: "Ref022", nombre: "Bolso negro tipo sobre gráficos tira cadena dorada", precio: 110000, img: "imagenes/Ref022.jpeg" },
            { ref: "Ref025", nombre: "Mochila mediana detalles cuero sintético estampado negro", precio: 70000, img: "imagenes/Ref025.jpeg" },

            { ref: "Ref053-Café-Claro", nombre: "Morral mediano dos bolsillos funcionales complementos", precio: 65000, img: "imagenes/Ref053-Café-Claro.jpeg" },
            { ref: "Ref030", nombre: "Billetera roja elegante práctica tarjetas documentos", precio: 48000, img: "imagenes/Ref030.jpeg" },
            { ref: "Ref032", nombre: "Billetera inspirada LV bolsillos tarjetero individual", precio: 50000, img: "imagenes/Ref032.jpeg" },
            { ref: "Ref029", nombre: "Monedero práctico tarjetas pequeños esenciales organizados", precio: 22000, img: "imagenes/Ref029.jpeg" }
        ];

        let carrito = [];

        const gridProductos = document.getElementById("gridProductos");
        gridProductos.innerHTML = productos.map(p => {
            const imagenSrc = p.img && p.img.trim() !== "" ? p.img : "https://images.unsplash.com/photo-1584917865442-de89df76afd3?w=500";
            return `
                <div class="card">
                    <div class="img-container">
                        <img src="${imagenSrc}" alt="${p.nombre}">
                    </div>
                    <div class="info">
                        <span class="ref-tag">REF: ${p.ref}</span>
                        <div class="titulo">${p.nombre}</div>
                        <div class="precio">$${p.precio.toLocaleString('es-CO')}</div>
                        <button class="btn-add" onclick="agregarAlCarrito('${p.nombre}', ${p.precio}, '${p.ref}', this)">Agregar al Pedido</button>
                    </div>
                </div>
            `;
        }).join('');

        function agregarAlCarrito(nombre, precio, ref, boton) {
            const existe = carrito.find(item => item.ref === ref);
            
            if (!existe) {
                carrito.push({ nombre, precio, ref });
                boton.innerText = "✓ Agregado";
                boton.classList.add("added");
            } else {
                carrito = carrito.filter(item => item.ref !== ref);
                boton.innerText = "Agregar al Pedido";
                boton.classList.remove("added");
            }
            
            actualizarInterfazCarrito();
        }

        function actualizarInterfazCarrito() {
            const cartBar = document.getElementById("cartBar");
            const itemsCount = document.getElementById("itemsCount");
            const itemsTotal = document.getElementById("itemsTotal");
            
            if (carrito.length > 0) {
                let total = carrito.reduce((sum, item) => sum + item.precio, 0);
                itemsCount.innerText = `${carrito.length} ${carrito.length === 1 ? 'artículo seleccionado' : 'artículos seleccionados'}`;
                itemsTotal.innerText = `$${total.toLocaleString('es-CO')}`;
                cartBar.classList.add("show");
            } else {
                cartBar.classList.remove("show");
            }
        }

        function abrirModalPedido() {
            let total = carrito.reduce((sum, item) => sum + item.precio, 0);
            
            let mensaje = "NUEVO PEDIDO DESDE EL CATALOGO WEB\n\n";
            mensaje += "Hola, me interesan los siguientes articulos:\n";
            
            carrito.forEach((item, index) => {
                mensaje += "\n" + (index + 1) + ". " + item.nombre + " - REF: " + item.ref + " - Precio: $" + item.precio.toLocaleString('es-CO');
            });
            
            mensaje += "\n\nVALOR TOTAL DE LA COMPRA: $" + total.toLocaleString('es-CO') + "\n\n";
            mensaje += "Me indicas por favor los pasos para coordinar el pago y el envio? Muchas gracias.";
            
            document.getElementById("txtMensaje").value = mensaje;
            document.getElementById("pedidoModal").classList.add("open");
        }

        function cerrarModalPedido() {
            document.getElementById("pedidoModal").classList.remove("open");
        }

        function enviarPedidoConfirmado() {
            const numeroTelefono = "573043956874"; 
            const mensajeFinal = document.getElementById("txtMensaje").value;
            
            if (!mensajeFinal.trim()) return;

            const urlFinal = `https://wa.me/${numeroTelefono}?text=${encodeURIComponent(mensajeFinal)}`;
            window.open(urlFinal, '_blank');
            cerrarModalPedido();
        }
    </script>
</body>
</html>
